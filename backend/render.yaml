services:
  - type: web
    name: hiiinishant-backend
    env: node
    plan: starter # Starter plan is required for persistent disks on Render
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PASSWORD
        sync: false # SHA-256 hash of password (e.g. nishant2am hash is c54dfd60e7552554703a55b3b1f5c6b97a22026858e9ad36cc2e9be49df0a5be)
      - key: JWT_SECRET
        sync: false # Optional, will fallback to ADMIN_PASSWORD if empty
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: "Nishant's Portfolio Backend"
      - key: EMAIL_TO
        sync: false
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
